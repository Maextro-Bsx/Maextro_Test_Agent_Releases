<!DOCTYPE html>
<html>
<head>
  <title>Maextro Automation Runner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #050505;
      min-height: 100vh;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      color: #111;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 84px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      z-index: 999;
    }

    .topbar-inner {
      width: 100%;
      max-width: 1400px;
      padding: 0 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 42px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: white;
    }

    .right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-btn {
      border: none;
      border-radius: 18px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    #updateBtn {
      background: #2f66f3;
      color: white;
      box-shadow: 0 8px 18px rgba(47, 102, 243, 0.25);
    }

    #updateBtn:hover {
      background: #2557db;
    }

    .about-btn {
      background: #2f66f3;
      color: white;
    }

    .about-btn:hover {
      background: #2557db;
    }

    .container {
      width: 680px;
      background: #f7f7f7;
      margin-top: 120px;
      border-radius: 22px;
      padding: 34px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #222;
    }

    .required {
      color: red;
    }

    input,
    select {
      width: 100%;
      height: 54px;
      border: 1px solid #d8d8d8;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 15px;
      background: white;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #2f66f3;
    }

    input[type="file"] {
      padding: 14px;
      height: auto;
    }

    .error-text {
      display: none;
      font-size: 12px;
      color: red;
      margin-top: 6px;
    }

    .button-group {
      display: flex;
      gap: 14px;
      margin-top: 18px;
    }

    .primary-btn,
    .secondary-btn {
      flex: 1;
      height: 54px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    .primary-btn {
      background: #2f66f3;
      color: white;
    }

    .secondary-btn {
      background: white;
      color: #2f66f3;
      border: 1px solid #2f66f3;
    }

    .primary-btn:disabled,
    .secondary-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .section-divider {
      text-align: center;
      margin: 24px 0 14px;
      font-size: 13px;
      font-weight: 600;
      color: #999;
      letter-spacing: 0.5px;
    }

    #loader {
      text-align: center;
      margin-top: 16px;
      color: #555;
      display: none;
    }

    #output {
      margin-top: 22px;
      min-height: 140px;
      background: white;
      border: 1px solid #e2e2e2;
      border-radius: 14px;
      padding: 16px;
      font-size: 13px;
      overflow-y: auto;
    }

    #fileName,
    #downloadMsg {
      font-size: 12px;
      margin-top: 8px;
    }

    .template-section {
      margin-top: 28px;
      background: #f1f4f9;
      border: 1px solid #dbe4f0;
      border-radius: 16px;
      padding: 20px;
    }

    .template-section-title {
      font-size: 14px;
      font-weight: 700;
      color: #2f66f3;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    #openDownloadsBtn,
    #openReportFolderBtn {
      margin-top: 12px;
      padding: 10px 18px;
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid #2f66f3;
      background: white;
      color: #2f66f3;
      font-weight: 600;
      cursor: pointer;
      display: none;
      width: auto;
      min-width: 240px;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="left">
        <img src="assets/logo.png" class="logo" />
        <span class="title">Maextro Automation</span>
      </div>

      <div class="right">
        <button id="updateBtn" class="header-btn" onclick="update()">🔄 Check for Updates</button>
        <button class="header-btn about-btn" onclick="openAbout()">ⓘ About</button>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="form-group">
      <label>Username <span class="required">*</span></label>
      <input id="username" placeholder="Enter your username" />
      <div class="error-text" id="usernameError">Username is required</div>
    </div>

    <div class="form-group">
      <label>Password <span class="required">*</span></label>
      <input id="password" type="password" placeholder="Enter your password" />
      <div class="error-text" id="passwordError">Password is required</div>
    </div>

    <div class="form-group">
      <label>Environment <span class="required">*</span></label>
      <select id="environment">
        <option value="">-- Select Environment --</option>
        <option value="DEV">DEV</option>
        <option value="TEST">TEST</option>
        <option value="SHS">SHS</option>
        <option value="RS">RS</option>
        <option value="Glanbia">Glanbia</option>
      </select>
      <div class="error-text" id="environmentError">Environment is required</div>
    </div>

    <div class="form-group">
      <!-- <label>Excel for Template <span class="required">*</span></label> -->
      <label>Excel for Template</label>
      <select id="templateId">
        <option value="">-- Select Template --</option>
      </select>
      <div class="error-text" id="templateIdError">Template is required</div>
    </div>

    <div class="form-group">
      <!-- <label>Upload Filled Excel <span class="required">*</span></label> -->
      <label>Upload Filled Excel</label> 
      <input type="file" id="excelFile" accept=".xlsx" />
      <div class="error-text" id="fileError">File is required</div>
    </div>

    <div id="fileName"></div>

    <div class="button-group">
      <button id="runBtn" class="primary-btn" onclick="runTest()" disabled>▶ Run Test</button>
      <button id="reportBtn" class="secondary-btn" onclick="openReport()" disabled>📊 View Latest Report</button>
    </div>
    <button id="openReportFolderBtn" type="button" onclick="openSavedReportFolder()" style="display: none;">
          📂 Open Saved Report Folder
      </button>
    <div class="template-section">
      <div class="template-section-title">Excel Generator for Template</div>

    <div class="button-group">
      <button id="recordBtn" class="secondary-btn" onclick="startRecording()" disabled >⏺ Record</button>
      <button id="downloadBtn" class="secondary-btn" onclick="downloadTemplate()" disabled >⬇ Download Template</button>
    </div>
    </div>

    <div id="downloadMsg"></div>

    <button id="openDownloadsBtn" type="button" onclick="openSavedFolder()" style="display: none;">
      📂 Open Saved Folder
    </button>

    <div id="loader">⏳ Running test...</div>

    <div id="output"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
